<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings - DXF to PDF Converter</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232563eb'/%3E%3Cpath d='M7 11h6l-3 5h3l-5 8v-5H7v-5zm12-3h2v3h3v2h-3v3h-2v-3h-3V11h3V8z' fill='%23fff'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel hero">
        <div class="topbar">
          <p class="eyebrow" data-i18n="settingsPage">Settings</p>
          <div class="topbar-actions">
            <a href="/" class="icon-btn" title="Back to converter" aria-label="Back">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </a>
            <div class="menu-wrap">
              <button type="button" class="icon-btn menu-btn" id="menuToggle" aria-label="Menu">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
              </button>
              <div class="menu-dropdown" id="menuDropdown">
                <div class="menu-item menu-item-lang" id="menuLangItem">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                  <select id="langSelect" class="menu-lang-select">
                    <option value="en">EN</option>
                    <option value="ru">RU</option>
                    <option value="es">ES</option>
                    <option value="zh">ZH</option>
                  </select>
                </div>
                <button type="button" class="menu-item" id="themeToggle" title="Toggle theme">
                  <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                  <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                  <span class="menu-item-label" id="themeLabel">Dark theme</span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <h1 data-i18n="settingsTitle">Layer style rules</h1>
        <p class="lead" data-i18n="settingsLead">Customize colors, widths, dash styles, and summary inclusion for each layer.</p>

        <div class="note settings-note" data-i18n="ruleNote">Rule matching is case-insensitive and checks whether the layer name contains the text in the Match field.</div>
        <div class="settings-actions">
          <button type="button" id="saveSettings" data-i18n="saveSettings">Save settings</button>
          <button type="button" id="addRule" data-i18n="addRule">Add rule</button>
        </div>
        <div class="rules" id="rules"></div>
        <p class="status" id="status" data-i18n="settingsSavedStatus">Changes are saved automatically when you click Save.</p>
      </section>
    </main>

    <script>
      const defaultStyles = {{ default_styles | tojson }};

      const translations = {
        en: {
          themeToggle_light: "Light theme",
          themeToggle_dark: "Dark theme",
          settingsPage: "Settings",
          backToHome: "Back to converter",
          settingsTitle: "Layer style rules",
          settingsLead: "Customize colors, widths, dash styles, and summary inclusion for each layer.",
          ruleNote: "Rule matching is case-insensitive and checks whether the layer name contains the text in the Match field.",
          saveSettings: "Save settings",
          addRule: "Add rule",
          settingsSavedStatus: "Changes are saved automatically when you click Save.",
          saved: "Settings saved.",
          match: "Match",
          color: "Color",
          width: "Width",
          line: "Line",
          solid: "Solid",
          dashed: "Dashed",
          includeInTotal: "Include in total",
          remove: "Remove",
        },
        ru: {
          themeToggle_light: "Светлая тема",
          themeToggle_dark: "Тёмная тема",
          settingsPage: "Настройки",
          backToHome: "Назад к конвертеру",
          settingsTitle: "Правила стилей слоёв",
          settingsLead: "Настройте цвета, толщину, стиль линий и учёт в итоговой длине для каждого слоя.",
          ruleNote: "Сопоставление правил не чувствительно к регистру и проверяет, содержит ли имя слоя текст из поля «Совпадение».",
          saveSettings: "Сохранить настройки",
          addRule: "Добавить правило",
          settingsSavedStatus: "Изменения сохраняются автоматически при нажатии «Сохранить».",
          saved: "Настройки сохранены.",
          match: "Совпадение",
          color: "Цвет",
          width: "Толщина",
          line: "Линия",
          solid: "Сплошная",
          dashed: "Пунктир",
          includeInTotal: "Учитывать в итоге",
          remove: "Удалить",
        },
        es: {
          themeToggle_light: "Tema claro",
          themeToggle_dark: "Tema oscuro",
          settingsPage: "Configuración",
          backToHome: "Volver al convertidor",
          settingsTitle: "Reglas de estilo de capas",
          settingsLead: "Personalice colores, grosores, estilos de línea e inclusión en el resumen para cada capa.",
          ruleNote: "La coincidencia de reglas no distingue mayúsculas/minúsculas y verifica si el nombre de la capa contiene el texto del campo Coincidencia.",
          saveSettings: "Guardar configuración",
          addRule: "Agregar regla",
          settingsSavedStatus: "Los cambios se guardan automáticamente al hacer clic en Guardar.",
          saved: "Configuración guardada.",
          match: "Coincidencia",
          color: "Color",
          width: "Ancho",
          line: "Línea",
          solid: "Sólida",
          dashed: "Discontinua",
          includeInTotal: "Incluir en total",
          remove: "Eliminar",
        },
        zh: {
          themeToggle_light: "浅色主题",
          themeToggle_dark: "深色主题",
          settingsPage: "设置",
          backToHome: "返回转换器",
          settingsTitle: "图层样式规则",
          settingsLead: "自定义每个图层的颜色、宽度、线型以及汇总计入方式。",
          ruleNote: "规则匹配不区分大小写，检查图层名称是否包含「匹配」字段中的文本。",
          saveSettings: "保存设置",
          addRule: "添加规则",
          settingsSavedStatus: "点击保存按钮时自动保存更改。",
          saved: "设置已保存。",
          match: "匹配",
          color: "颜色",
          width: "宽度",
          line: "线型",
          solid: "实线",
          dashed: "虚线",
          includeInTotal: "计入总计",
          remove: "删除",
        },
      };

      let currentLang = localStorage.getItem("lang") || "en";

      function t(key) {
        return (translations[currentLang] && translations[currentLang][key]) || translations.en[key] || key;
      }

      function applyLanguage() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (el.tagName === "OPTION" || el.children.length === 0) {
            el.textContent = t(key);
          }
        });
        document.getElementById("langSelect").value = currentLang;
        document.documentElement.lang = currentLang === "zh" ? "zh-CN" : currentLang;
        const themeLabel = document.getElementById("themeLabel");
        if (themeLabel) {
          const isDark = document.documentElement.dataset.theme === "dark";
          themeLabel.textContent = isDark ? t("themeToggle_light") : t("themeToggle_dark");
        }
      }

      const rules = document.getElementById("rules");
      const statusText = document.getElementById("status");
      const addRuleButton = document.getElementById("addRule");
      const saveSettingsButton = document.getElementById("saveSettings");
      const themeToggle = document.getElementById("themeToggle");
      const langSelect = document.getElementById("langSelect");
      const settingsKey = "dxfPdfConverterSettings";

      function createRuleRow(rule = { match: "", color: "#000000", width: 1, dash: "solid", include_in_total: true }) {
        const row = document.createElement("div");
        row.className = "rule-row";
        row.innerHTML = `
          <label><span class="match-label">${t("match")}</span><input class="match" type="text" value="${rule.match || ""}"></label>
          <label><span class="color-label">${t("color")}</span><input class="color" type="color" value="${rule.color || "#000000"}"></label>
          <label><span class="width-label">${t("width")}</span><input class="width" type="number" min="0.1" step="0.1" value="${rule.width || 1}"></label>
          <label><span class="line-label">${t("line")}</span><select class="dash"><option value="solid">${t("solid")}</option><option value="dashed">${t("dashed")}</option></select></label>
          <label class="checkbox-label"><span class="include-label">${t("includeInTotal")}</span><input class="include-in-total" type="checkbox"></label>
          <button class="remove" type="button">${t("remove")}</button>
        `;
        row.querySelector(".dash").value = rule.dash || "solid";
        row.querySelector(".include-in-total").checked = rule.include_in_total !== false;
        row.querySelector(".remove").addEventListener("click", () => { row.remove(); });
        rules.appendChild(row);
      }

      function collectRules() {
        return [...rules.querySelectorAll(".rule-row")].map((row) => ({
          match: row.querySelector(".match").value,
          color: row.querySelector(".color").value,
          width: Number(row.querySelector(".width").value) || 1,
          dash: row.querySelector(".dash").value,
          include_in_total: row.querySelector(".include-in-total").checked,
        })).filter((rule) => rule.match.trim());
      }

      function loadSettings() {
        let saved = null;
        try {
          saved = JSON.parse(localStorage.getItem(settingsKey) || "null");
        } catch { saved = null; }
        const data = saved || { rules: defaultStyles, summaryMode: "pdf-only" };
        (data.rules || defaultStyles).forEach(createRuleRow);
      }

      function saveSettings() {
        localStorage.setItem(settingsKey, JSON.stringify({ rules: collectRules(), summaryMode: document.getElementById("summaryMode")?.value || "pdf-only" }));
        statusText.textContent = t("saved");
      }

      function applyTheme(theme) {
        document.documentElement.dataset.theme = theme;
        const themeLabel = document.getElementById("themeLabel");
        if (themeLabel) {
          themeLabel.textContent = theme === "dark" ? t("themeToggle_light") : t("themeToggle_dark");
        }
        localStorage.setItem("theme", theme);
      }

      document.getElementById("menuToggle").addEventListener("click", (e) => {
        e.stopPropagation();
        document.getElementById("menuDropdown").classList.toggle("open");
      });

      document.addEventListener("click", (e) => {
        const dd = document.getElementById("menuDropdown");
        if (dd.classList.contains("open") && !dd.contains(e.target) && e.target !== document.getElementById("menuToggle")) {
          dd.classList.remove("open");
        }
      });

      langSelect.addEventListener("change", () => {
        currentLang = langSelect.value;
        localStorage.setItem("lang", currentLang);
        applyLanguage();
      });

      addRuleButton.addEventListener("click", () => createRuleRow());
      saveSettingsButton.addEventListener("click", saveSettings);
      themeToggle.addEventListener("click", () => applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark"));
      loadSettings();
      applyTheme(localStorage.getItem("theme") || "light");
      applyLanguage();
    </script>
  </body>
</html>
